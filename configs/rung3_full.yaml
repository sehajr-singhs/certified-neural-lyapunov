# Rungs 3 and 4, full 20-D state. Where branch-and-bound cost bites.
# Drives the full-state sweeps in e3_certify_lie.py and e5_boundary.py.
condition: 4b
state_dim: 20
region:
  type: full_box                # x* +/- r across every coordinate
  contains_equilibrium: true    # so a tolerance eps is required
  eps: 0.05
  rung3_radii: [0.01, 0.02, 0.03, 0.05, 0.08, 0.12, 0.18, 0.25]
  rung4_radius: 0.5
verifier:
  method: CROWN
  min_width: 0.01
  time_budget_s: 45
note: >
  Failures here are reported as genuine violations (a counterexample exists) or
  incompleteness (bound too loose), never conflated. The slice-hardened network
  genuinely violates (4b) in the full state, so full-state CEGIS is future work.
